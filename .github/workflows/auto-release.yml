name: Auto-Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      # "auto" releases only Dependabot-authored changes as the next
      # patch; any other value releases the current main unconditionally
      # with that component bumped (how human changes get released).
      bump:
        description: 'Optional — version component to bump for a manual release'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      # Safety pin: main must point at this SHA or the run aborts — a
      # release never silently includes more than what was reviewed.
      commit:
        description: 'Required — SHA of the commit to release (aborts when main is not exactly there)'
        required: true
        type: string

permissions:
  contents: write

# Only the latest push to main matters; superseded runs are redundant.
concurrency:
  group: auto-release
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
          # bump-version.sh pushes with an explicit token instead, so the
          # writable credential is never left in .git/config — nothing this
          # job runs now or later could scrape it from there.
          persist-credentials: false

      - name: Decide whether a release should happen and which tag it gets
        id: decide
        env:
          BUMP: ${{ inputs.bump }}
          EXPECTED_COMMIT: ${{ inputs.commit }}
        run: .github/scripts/auto-release/decide-release.sh

      - name: Bump the package version to the release tag
        if: steps.decide.outputs.release == 'true'
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: .github/scripts/auto-release/bump-version.sh

      # The release starts as a draft so it only becomes visible — and the
      # releases/latest/download URL only switches over — once the tarball
      # is attached.
      - name: Create draft release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.decide.outputs.tag }}
          SHA: ${{ steps.bump.outputs.sha }}
        run: .github/scripts/auto-release/create-draft.sh

  build-assets:
    needs: prepare-release
    if: needs.prepare-release.outputs.release == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-release-assets.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      ref: ${{ needs.prepare-release.outputs.sha }}

  # Only runs when the tarball got attached, so a broken build never
  # becomes a public release.
  publish:
    needs: [prepare-release, build-assets]
    if: >-
      !cancelled() &&
      needs.prepare-release.outputs.release == 'true' &&
      needs.build-assets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
