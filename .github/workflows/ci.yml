name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node >= 23.6 runs .ts directly via built-in type stripping (see engines).
        node-version: ['24', '26']
    name: check (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # Skip install scripts: node-pty's native build and the postinstall exec-bit
      # fix aren't needed to type-check, lint or run the tests (node-pty is only
      # imported lazily at runtime, never loaded by the suite).
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run knip
      - run: npm test
