name: Run Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets dependabot-auto-merge.yml run these checks as its merge gate.
  workflow_call:
    inputs:
      ref:
        description: 'Commit SHA to check instead of the commit that triggered the run'
        required: true
        type: string

permissions:
  contents: read

# The inputs.ref suffix keeps workflow_call runs in groups of their own,
# so they can never cancel a standalone run (or vice versa).
concurrency:
  group: run-checks-${{ github.ref }}-${{ inputs.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # CI runs the .ts sources directly (needs type stripping), so it can't
          # use the engines floor of 20 that the compiled dist/ targets.
          node-version: '24'
          cache: npm

      # Skip install scripts: node-pty's native build isn't needed to
      # type-check, lint or run the tests (node-pty is only imported
      # lazily at runtime, never loaded by the suite).
      - name: Install
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Knip
        run: npm run knip

      - name: Test
        run: npm test

      # Exercise the packaging path: build dist/ and run the compiled CLI a
      # release install ships.
      - name: Build package
        run: npm run build

      - name: Smoke-test compiled CLI
        run: node dist/bin/cli.js version
